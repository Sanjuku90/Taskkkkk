kind = "web"
previewPath = "/"
title = "TaskCoin"
version = "1.0.0"
id = "artifacts/taskcoin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18341

[services.development]
run = "pnpm --filter @workspace/taskcoin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taskcoin", "run", "build" ]
publicDir = "artifacts/taskcoin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18341"
BASE_PATH = "/"
