services:
  - type: web
    name: taskcoin-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/taskcoin run build &&
      pnpm --filter @workspace/api-server run build &&
      cp -r artifacts/taskcoin/dist/public artifacts/api-server/dist/public &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/scripts run seed
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: taskcoin-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: taskcoin-db
    region: frankfurt
    plan: free
    databaseName: taskcoin
    user: taskcoin
